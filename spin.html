<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PocketPulse - Slots</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = {
          theme: {
            extend: {
              "colors": {
                  "primary": "#a73a00",
                  "primary-container": "#ff5c00",
                  "surface-container-low": "#f6f4e8",
                  "surface-variant": "#e5e3d7"
              }
            }
          }
        }
    </script>
</head>
<body>
<main>
    <div class="bg-surface-container-low rounded-[2rem] p-6 shadow-xl border-4 border-surface-variant relative mt-8 flex flex-col gap-6">
        <!-- Coin Slot -->
        <div class="flex justify-center">
            <div id="coin-slot-trigger" class="bg-surface-variant px-6 py-2 rounded-full shadow-inner border border-stone-400 cursor-pointer hover:bg-stone-200 transition-all active:scale-95 group">
                <span id="coin-slot-label" class="font-bold text-[10px] tracking-widest text-stone-600 group-hover:text-primary">INSERT CREDIT</span>
            </div>
        </div>

        <!-- Display -->
        <div class="lcd-screen p-4 flex flex-col items-end gap-1">
            <span id="outcome-display" class="text-[10px] font-bold opacity-80 uppercase tracking-widest">SYSTEM READY</span>
            <span id="credit-count" class="text-3xl font-bold tracking-widest text-primary-container drop-shadow-md">0,000</span>
        </div>

        <!-- Machine -->
        <div id="machine-container" class="lcd-screen p-3 flex justify-between gap-2 h-32 relative overflow-hidden">
            <div class="payline"></div>
            <div class="reel-window flex-1"><div id="reel-1" class="reel-col"></div></div>
            <div class="reel-window flex-1"><div id="reel-2" class="reel-col"></div></div>
            <div class="reel-window flex-1"><div id="reel-3" class="reel-col"></div></div>
        </div>

        <!-- Controls -->
        <div class="flex justify-center py-4">
            <button id="spin-handle" class="w-24 h-24 rounded-full bg-primary border-4 border-white/30 shadow-2xl flex items-center justify-center transition-all active:scale-90 active:translate-y-2">
                <span class="text-white font-bold tracking-tighter">SPIN</span>
            </button>
        </div>
    </div>
</main>

<div id="coin-modal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <h3 class="font-bold text-center mb-6 text-primary tracking-widest uppercase">Select Credit</h3>
        <div class="modal-options">
            <button id="bet-opt-1" class="modal-btn">
                <div class="font-bold text-primary">LEVEL 1</div>
                <div class="text-xs opacity-80">1 Any Token &bull; Low Odds</div>
            </button>
            <button id="bet-opt-2" class="modal-btn">
                <div class="font-bold text-primary">LEVEL 2</div>
                <div class="text-xs opacity-80">2 Matching &bull; Mid Odds</div>
            </button>
            <button id="bet-opt-3" class="modal-btn">
                <div class="font-bold text-primary">LEVEL 3</div>
                <div class="text-xs opacity-80">3 Matching &bull; HIGH ODDS</div>
            </button>
        </div>
        <button id="btn-modal-cancel" class="w-full mt-4 text-[10px] font-bold opacity-50 uppercase tracking-widest">Cancel</button>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>
<nav class="bottom-nav">
    <a href="habit.html" class="nav-item">
        <span class="material-symbols-outlined">event_repeat</span>
        <span class="nav-label">Habits</span>
    </a>
    <a href="spin.html" class="nav-item active">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">casino</span>
        <span class="nav-label">Slots</span>
    </a>
    <a href="me.html" class="nav-item">
        <span class="material-symbols-outlined">account_balance_wallet</span>
        <span class="nav-label">Wallet</span>
    </a>
</nav>

<script src="app.js"></script>
</body>
</html>
