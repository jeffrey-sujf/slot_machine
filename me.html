<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PocketPulse - Wallet</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <script id="tailwind-config">
        tailwind.config = {
          theme: {
            extend: {
              "colors": {
                  "primary": "#a73a00",
                  "surface-container": "#f0eee2",
                  "surface-variant": "#e5e3d7"
              }
            }
          }
        }
    </script>
</head>
<body>
<main>
    <!-- Balance LCD -->
    <section class="lcd-screen p-6 mt-8 shadow-2xl">
        <div class="flex flex-col gap-1">
            <span class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Available Balance</span>
            <div class="flex items-baseline gap-2">
                <span id="total-balance" class="text-4xl font-bold tracking-tighter">0,000</span>
                <span class="text-xs opacity-50">TOKENS</span>
            </div>
        </div>
        <div class="mt-6 border-t border-white/10 pt-4 flex justify-between items-center">
            <div class="bg-tertiary/20 px-2 py-1 rounded border border-tertiary-fixed/30 text-[10px] font-bold">
                LIFETIME: <span id="stats-lifetime">0</span>
            </div>
            <span class="material-symbols-outlined text-sm opacity-50">insights</span>
        </div>
    </section>

    <!-- Assets Grid -->
    <section class="mt-8">
        <h2 class="text-xs font-bold uppercase tracking-widest opacity-50 mb-4 px-2">Inventory</h2>
        <div id="wallet-container" class="grid grid-cols-3 gap-4">
            <!-- Dynamic items -->
        </div>
    </section>

    <!-- Progress -->
    <section class="mt-8 bg-surface-container rounded-2xl p-6 border border-surface-variant">
        <div class="flex justify-between items-end mb-6">
            <h3 class="font-bold text-lg">Goal Progress</h3>
            <span id="weekly-progress-text" class="text-[10px] font-bold bg-white px-2 py-0.5 rounded-full shadow-sm">0/20</span>
        </div>
        
        <div class="space-y-6">
            <div>
                <div class="flex justify-between text-[10px] font-bold uppercase tracking-wider mb-2 opacity-60">
                    <span>Monthly Milestone</span>
                    <span id="monthly-progress-text">0/100</span>
                </div>
                <div class="h-3 bg-surface-variant rounded-full overflow-hidden shadow-inner p-0.5">
                    <div id="monthly-progress-fill" class="h-full bg-secondary rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </section>
</main>

<nav class="bottom-nav">
    <a href="habit.html" class="nav-item">
        <span class="material-symbols-outlined">event_repeat</span>
        <span class="nav-label">Habits</span>
    </a>
    <a href="spin.html" class="nav-item">
        <span class="material-symbols-outlined">casino</span>
        <span class="nav-label">Slots</span>
    </a>
    <a href="me.html" class="nav-item active">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
        <span class="nav-label">Wallet</span>
    </a>
</nav>

<script src="app.js"></script>
</body>
</html>
